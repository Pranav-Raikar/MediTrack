name: meditrack
description: AI-Powered Medicine Reminder & Health EHR SaaS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.69.0

  # Monetisation
  google_mobile_ads: ^5.1.0
  razorpay_flutter: ^1.3.6

  # Networking (Cloud Function calls)
  http: ^1.2.0

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
